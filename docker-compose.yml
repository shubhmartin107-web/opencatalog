version: "3.9"

services:
  opencatalog:
    build: .
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=info
      - CATALOG_HOST=0.0.0.0
      - CATALOG_PORT=8080
      - LLM_BASE_URL=http://ollama:11434
      - LLM_MODEL=llama3.2
      - CATALOG_API_KEYS=${CATALOG_API_KEYS:-}
    volumes:
      - opencatalog_data:/data

  # Optional: Local LLM
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    profiles:
      - llm
    volumes:
      - ollama_data:/root/.ollama

volumes:
  opencatalog_data:
  ollama_data:
