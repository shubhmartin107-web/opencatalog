version: "3.9"

services:
  # OpenLake — Iceberg lakehouse with sample data
  openlake:
    image: openlake:latest
    build:
      context: ../../openlake
    ports:
      - "9090:9090"
    environment:
      - RUST_LOG=info
      - OPENLAKE_STORAGE=memory
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/api/v1/health"]
      interval: 5s
      retries: 10

  # OpenIngest — CDC pipeline with PII masking
  openingest:
    image: openingest:latest
    build:
      context: ../../openingest
    ports:
      - "7080:7080"
    environment:
      - RUST_LOG=info
    depends_on:
      openlake:
        condition: service_healthy
    volumes:
      - ./pipeline.yaml:/etc/openingest/pipeline.yaml

  # OpenCatalog — Metadata catalog service
  opencatalog:
    build:
      context: ..
      dockerfile: demo/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=info
      - CATALOG_HOST=0.0.0.0
      - CATALOG_PORT=8080
      - LLM_BASE_URL=http://ollama:11434
      - LLM_MODEL=llama3.2
    depends_on:
      - openlake
      - openingest

  # Ollama — Local LLM for doc generation and semantic search
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
